<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    
    <div class="container mt-5">
        <div class="progress ">
            <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%" id="pgBar">0%</div>
        </div>
    </div>
          
    <button class="btn btn-primary" onclick="changeProgress()">Click me</button>
    <script>

        function changeProgress(){
            let progress = 0;
            let progressCounter = setInterval(()=>{
                progress+=10;
                if(progress >= 100){
                    clearInterval(progressCounter)
                }
                document.getElementById('pgBar').style.width = `${progress}%`
                document.getElementById('pgBar').innerHTML = `${progress}%`
            },1000)
        }

    </script>

</body>
</html>
