<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mediaquery</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{
             width: 100%;
             background-color: #444;
             display: grid;
             grid-template-columns: repeat(3, 1fr);
      }
      .item{
        padding: 0;
        color: #fff;
      }
      @media screen and (max-width: 500px){
        .container{
            grid-template-columns: 1fr 1fr;
        }
    }
    @media screen and (max-width: 700px){
        .container{
            grid-template-columns: 1fr 1fr;
        }
    }


    </style>
</head>
<body>
    
    <div class="container">
        <div class="list">list 1</div>
        <div class="list">list 2</div>
        <div class="list">list 3</div>
        <div class="list">list 4</div>
        <div class="list">list 5</div>
        <div class="list">list 6</div>
        <div class="list">list 7</div>
        <div class="list">list 8</div>
        <div class="list">list 9</div>
    </div>

</body>
</html>
