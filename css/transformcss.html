<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        *{
            padding: 0%;
            margin: 0%;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .child{
            height: 200px;
            width: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.9s;
        }
        .child:hover{
            transform: rotate(360deg);
            /* transform: scale(1.5); */
            /* transform: skew(30deg,30deg); */
            /* transform: translate(100px,100px); */
            /* transform: matrix(1.5,0,0,1.5,0,0); */
        }
    </style>
</head>
<body>
    <div class="child"><img src="bugati chiron.jpg" alt=""></div>
</body>
</html>
