<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .image{
            height: 150px;
            width: 150px;
            position: relative;
            animation: slide 3s 1s infinite ;
            transition: 0.5s;
        }
        @keyframes slide {
            from{
                top: 0%;
                left: 0%;
                opacity: 0;
            }
            to{
                top: 0%;
                left: 25%;

            }
        }
        
    </style>
</head>
<body>
    
    <div class="image">
        <img src="m4.webp" alt="">
    </div>

</body>
</html>
