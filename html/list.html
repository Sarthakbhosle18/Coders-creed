<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <p>Html List</p>
    <!-- unorder list -->
    <ul type="square">
     <li>mango</li>
     <dd>yellow</dd>
     <li>apple</li>
     <dd>red</dd>
     <li>grapes</li>
     <dd>green</dd>
     <li>chiku</li>
     <dd>brown</dd>
    </ul>
    <!-- ordered list -->
    <ol type="i">
        <li>Mumbai</li>
        <li>Delhi</li>
        <li>Gujarat</li>
        <li>Kerla</li>
    </ol>
    <!-- definition list -->
    <dl>
        <dt><b>Html</b></dt>
        <dd>html stands for hyper text markup language</dd>
    </dl>
</body>
</html>
