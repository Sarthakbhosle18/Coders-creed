<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>find month</title>
</head>
<body>
    
    <script>

        let day = new Date().getMonth()
        console.log(day)
        switch(day){
            case 0:{
                console.log("jan")
                break;
            }
            case 0:{
                console.log("Feb")
                break;
            }
            case 0:{
                console.log("Mar")
                break;
            }
            case 0:{
                console.log("Apr")
                break;
            }
            case 0:{
                console.log("May")
                break;
            }
            case 0:{
                console.log("Jun")
                break;
            }
            case 0:{
                console.log("Jul")
                break;
            }
            case 0:{
                console.log("Aug")
                break;
            }
            case 0:{
                console.log("Sep")
                break;
            }
            case 0:{
                console.log("Oct")
                break;
            }
            case 0:{
                console.log("Nov")
                break;
            }
            case 0:{
                console.log("Dec")
                break;
            }
            default:{
                console.log("Dec")
                break;
            }
        }

    </script>

</body>
</html>
