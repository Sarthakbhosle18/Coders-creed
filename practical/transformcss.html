<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        *{
            padding: 0%;
            margin: 0%;
        }
        body{
            height: 100vh;
            display: grid;
            justify-content: center;
            align-items: center;
        }
        .child{
            height: 200px;
            width: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 1.9s;
        }
        .child:hover{
            /* transform: rotateX(360deg); */
            /* transform: scale(1.5); */
            /* transform: skew(30deg,30deg); */
            transform: translateY(120px) ;
            /* transform: matrix(0,0,0,0,100,100); */
            /* matrix(scaleX(), skewY(), skewX(), scaleY(), translateX(), translateY()) */
        }
    </style>
</head>
<body>
    <div class="child"><img src="bugati chiron.jpg" style=" border-radius: 25px;" alt=""></div>
</body>
</html>
