<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Statement</title>
</head>
<body>
    
    <script>

      let  n1 = 20;
        n2 = 20;

        if (!(n1 >= n2) ) {
            console.log("n1 is greater than or equal to n2");
            }
            else if (n1 < n2) {
                console.log("n1 is less than n2");
                }
            else{
                console.log("n1 is equal to n2");
            }

    </script>

</body>
</html>
